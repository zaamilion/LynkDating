<!DOCTYPE html>
<html>

<head>
    <title>Регистрация</title>
    <link rel="stylesheet" href="signup.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <script src="signup.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=0.85">
</head>

<body>
    <div class="form-container">
        <h1>Регистрация</h1>
        <form id="RegForm">
            <input id="username" type="text" name="username" placeholder="Логин" required>
            <input id="password" type="password" name="password" placeholder="Пароль" required>
            <button id="submit" class="btn">Зарегистрироваться</button>
        </form>
    </div>
</body>

</html>
